apiVersions:
  argocd: argoproj.io/v1alpha1

defaults:
  namespace: argocd
  project: default
  destinationServer: https://kubernetes.default.svc

applications:
  - name: agentgateway
    annotations:
      argocd.argoproj.io/sync-wave: "0"
    source:
      repoURL: cr.agentgateway.dev/charts
      targetRevision: v1.0.1
      chart: agentgateway
      helm:
        releaseName: agentgateway
        skipCrds: false
    destination:
      namespace: agentgateway-system
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
