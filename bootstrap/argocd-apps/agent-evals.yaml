apiVersions:
  argocd: argoproj.io/v1alpha1

defaults:
  namespace: argocd
  project: default
  destinationServer: https://kubernetes.default.svc

applications:
  - name: agent-evals
    labels:
      app.kubernetes.io/part-of: phase1-ai-platform
      harokilabs.com/phase: "1"
    info:
      - name: category
        value: eval-platform
      - name: status
        value: upstream-helm-chart
    source:
      repoURL: https://github.com/agentevals-dev/agentevals.git
      targetRevision: v0.6.3
      path: charts/agentevals
      helm:
        releaseName: agent-evals
        values: |
          image:
            tag: "0.6.3"
          service:
            type: ClusterIP
          envFrom:
            - secretRef:
                name: agent-evals-env
                optional: true
          podLabels:
            app.kubernetes.io/part-of: phase1-ai-platform
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
    destination:
      namespace: agent-evals
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
      syncOptions:
        - CreateNamespace=true
