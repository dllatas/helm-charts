{{- range $externalSecret := .Values.externalSecrets }}
{{- $labels := mergeOverwrite (dict) $.Values.defaults.labels (default (dict) $externalSecret.labels) -}}
{{- $annotations := mergeOverwrite (dict) $.Values.defaults.annotations (default (dict) $externalSecret.annotations) -}}
{{- $namespace := default $.Values.defaults.namespace $externalSecret.namespace -}}
{{- $secretStoreRef := mergeOverwrite (dict) (default (dict) $.Values.defaults.secretStoreRef) (default (dict) $externalSecret.secretStoreRef) -}}
{{- $targetDefaults := default (dict) $.Values.defaults.target -}}
{{- $target := default (dict) $externalSecret.target -}}
{{- $targetTemplate := dict -}}
{{- with $target.template }}
{{- $targetTemplate = deepCopy . -}}
{{- if eq $.Values.apiVersion "external-secrets.io/v1" }}
{{- $targetTemplate = mergeOverwrite (dict "engineVersion" "v2" "mergePolicy" "Replace") $targetTemplate -}}
{{- end }}
{{- end }}
{{- $data := list -}}
{{- range $item := default (list) $externalSecret.data }}
{{- $renderedItem := deepCopy $item -}}
{{- if and (eq $.Values.apiVersion "external-secrets.io/v1") (hasKey $renderedItem "remoteRef") }}
{{- $_ := set $renderedItem "remoteRef" (mergeOverwrite (dict "conversionStrategy" "Default" "decodingStrategy" "None" "metadataPolicy" "None") $renderedItem.remoteRef) -}}
{{- end }}
{{- $data = append $data $renderedItem -}}
{{- end }}
---
apiVersion: {{ $.Values.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ $externalSecret.name }}
  namespace: {{ $namespace }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" $.Chart.Name $.Chart.Version | trunc 63 | trimSuffix "-" | quote }}
    app.kubernetes.io/name: {{ $.Chart.Name | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
{{- with $labels }}
{{ toYaml . | indent 4 }}
{{ end }}
{{- with $annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{ end }}
spec:
  refreshInterval: {{ default $.Values.defaults.refreshInterval $externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ $secretStoreRef.kind }}
    name: {{ $secretStoreRef.name }}
  target:
    name: {{ $target.name }}
    creationPolicy: {{ default $targetDefaults.creationPolicy $target.creationPolicy }}
    deletionPolicy: {{ default $targetDefaults.deletionPolicy $target.deletionPolicy }}
{{- if hasKey $target "immutable" }}
    immutable: {{ $target.immutable }}
{{- end }}
{{- with $targetTemplate }}
    template:
{{ toYaml . | indent 6 }}
{{- end }}
{{- with $data }}
  data:
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $externalSecret.dataFrom }}
  dataFrom:
{{ toYaml . | indent 4 }}
{{- end }}
{{ printf "\n" }}
{{ end }}
