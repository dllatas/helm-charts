{{- range $externalSecret := .Values.externalSecrets }}
---
apiVersion: {{ $.Values.apiVersion }}
kind: ExternalSecret
metadata:
  name: {{ $externalSecret.name }}
  namespace: {{ $externalSecret.namespace }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" $.Chart.Name $.Chart.Version | trunc 63 | trimSuffix "-" | quote }}
    app.kubernetes.io/name: {{ $.Chart.Name | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
{{- with $externalSecret.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $externalSecret.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  refreshInterval: {{ default "1h" $externalSecret.refreshInterval | quote }}
  secretStoreRef:
    kind: {{ $externalSecret.secretStoreRef.kind }}
    name: {{ $externalSecret.secretStoreRef.name }}
  target:
    name: {{ $externalSecret.target.name }}
    creationPolicy: {{ default "Owner" $externalSecret.target.creationPolicy }}
    deletionPolicy: {{ default "Retain" $externalSecret.target.deletionPolicy }}
{{- if hasKey $externalSecret.target "immutable" }}
    immutable: {{ $externalSecret.target.immutable }}
{{- end }}
{{- with $externalSecret.target.template }}
    template:
{{ toYaml . | indent 6 }}
{{- end }}
{{- with $externalSecret.data }}
  data:
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $externalSecret.dataFrom }}
  dataFrom:
{{ toYaml . | indent 4 }}
{{- end }}
{{- end }}
