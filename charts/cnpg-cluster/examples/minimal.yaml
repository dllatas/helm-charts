cnpgClusters:
  - name: kratos-dbv2
    namespace: auth
    labels: {}
    annotations: {}
    spec:
      description: kratos db v2
      imageName: ghcr.io/cloudnative-pg/postgresql:17.4-14-bullseye
      instances: 1
      primaryUpdateStrategy: unsupervised
      superuserSecret:
        name: kratosv2-pg-admin
      storage:
        size: 10Gi
