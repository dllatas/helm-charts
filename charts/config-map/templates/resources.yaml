{{- range $resource := .Values.configMaps }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $resource.name }}
  namespace: {{ $resource.namespace }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" $.Chart.Name $.Chart.Version | trunc 63 | trimSuffix "-" | quote }}
    app.kubernetes.io/name: {{ $.Chart.Name | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
{{- with $resource.labels }}
{{ toYaml . | indent 4 }}
{{- end }}
{{- with $resource.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
{{- if hasKey $resource "immutable" }}
immutable: {{ $resource.immutable }}
{{- end }}
{{- with $resource.data }}
data:
{{ toYaml . | indent 2 }}
{{- end }}
{{- with $resource.binaryData }}
binaryData:
{{ toYaml . | indent 2 }}
{{- end }}
{{- end }}
