{{- define "tekton-ci.eventListenerTrigger" -}}
{{- $root := .root -}}
{{- $trigger := .trigger -}}
- name: {{ $trigger.name }}
  bindings:
    - ref: {{ include "tekton-ci.triggerBindingName" $root }}
    {{- if eq $root.Values.pipeline.mode "imageBuild" }}
    - name: image-reference
      value: {{ $trigger.image.reference | quote }}
    - name: image-dockerfile
      value: {{ $trigger.image.dockerfile | quote }}
    - name: image-context
      value: {{ $trigger.image.context | quote }}
    {{- end }}
  template:
    ref: {{ include "tekton-ci.triggerTemplateName" $root }}
  interceptors:
    - ref:
        name: github
      params:
        - name: secretRef
          value:
            secretName: {{ $root.Values.github.secretName }}
            secretKey: {{ $root.Values.github.secretKey }}
        - name: eventTypes
          value:
            {{- range $eventType := $root.Values.eventListener.eventTypes }}
            - {{ $eventType | quote }}
            {{- end }}
        {{- if $root.Values.eventListener.includeChangedFiles }}
        - name: addChangedFiles
          value:
            enabled: true
        {{- end }}
    - ref:
        name: cel
      params:
        - name: filter
          value: >
            {{- include "tekton-ci.celFilter" (dict "root" $root "trigger" $trigger) | nindent 12 }}
        - name: overlays
          value:
            - key: branch_name
              expression: "has(body.pull_request) ? body.pull_request.head.ref : body.ref.split('/')[2]"
            - key: git_revision
              expression: "has(body.pull_request) ? body.pull_request.head.sha : body.after"
            - key: before_sha
              expression: "has(body.pull_request) ? body.pull_request.base.sha : body.before"
            - key: after_sha
              expression: "has(body.pull_request) ? body.pull_request.head.sha : body.after"
            {{- if eq $root.Values.pipeline.mode "imageBuild" }}
            - key: short_sha
              expression: "(has(body.pull_request) ? body.pull_request.head.sha : body.after).truncate(7)"
            {{- end }}
{{- end -}}

{{- if eq .Values.eventListener.mode "single" }}
apiVersion: {{ .Values.apiVersions.triggers }}
kind: EventListener
metadata:
  name: {{ include "tekton-ci.singleListenerName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tekton-ci.commonLabels" . | nindent 4 }}
spec:
  serviceAccountName: {{ .Values.eventListener.serviceAccountName }}
  triggers:
    {{- range $trigger := .Values.triggers }}
    {{- include "tekton-ci.eventListenerTrigger" (dict "root" $ "trigger" $trigger) | nindent 4 }}
    {{- end }}
{{- else if eq .Values.eventListener.mode "perTrigger" }}
{{- range $trigger := .Values.triggers }}
---
apiVersion: {{ $.Values.apiVersions.triggers }}
kind: EventListener
metadata:
  name: {{ include "tekton-ci.perTriggerListenerName" (dict "root" $ "trigger" $trigger) }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "tekton-ci.commonLabels" $ | nindent 4 }}
spec:
  serviceAccountName: {{ $.Values.eventListener.serviceAccountName }}
  triggers:
    {{- include "tekton-ci.eventListenerTrigger" (dict "root" $ "trigger" $trigger) | nindent 4 }}
{{- end }}
{{- end }}
