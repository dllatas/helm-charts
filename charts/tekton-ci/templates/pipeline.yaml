apiVersion: {{ .Values.apiVersions.tekton }}
kind: Pipeline
metadata:
  name: {{ include "tekton-ci.pipelineName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tekton-ci.commonLabels" . | nindent 4 }}
spec:
  description: Generic webhook-triggered CI pipeline.
  params:
    - name: {{ .Values.pipeline.params.repoUrl }}
      type: string
      description: Git repository URL
    - name: {{ .Values.pipeline.params.revision }}
      type: string
      description: Git revision
    - name: {{ .Values.pipeline.params.branchName }}
      type: string
      description: Git branch name
    - name: {{ .Values.pipeline.params.eventType }}
      type: string
      description: GitHub webhook event type
    - name: {{ .Values.pipeline.params.beforeSha }}
      type: string
      description: Before SHA for push events
    - name: {{ .Values.pipeline.params.afterSha }}
      type: string
      description: After SHA for push events
    {{- if eq .Values.pipeline.mode "imageBuild" }}
    - name: {{ .Values.pipeline.params.imageReference }}
      type: string
    - name: {{ .Values.pipeline.params.imageTag }}
      type: string
    - name: {{ .Values.pipeline.params.imageDockerfile }}
      type: string
    - name: {{ .Values.pipeline.params.imageContext }}
      type: string
    {{- end }}
  workspaces:
    - name: shared-data
      description: Workspace holding cloned repository data.
    - name: ssh-creds
      description: SSH credentials for private repository access.
    - name: docker-credentials
      description: Registry credentials for image push.
  tasks:
    - name: clone-repo
      taskRef:
        name: {{ .Values.taskRefs.clone }}
      workspaces:
        - name: output
          workspace: shared-data
        - name: ssh-directory
          workspace: ssh-creds
      params:
        - name: url
          value: "$(params.{{ .Values.pipeline.params.repoUrl }})"
        - name: revision
          value: "$(params.{{ .Values.pipeline.params.revision }})"
        - name: depth
          value: "0"
        - name: deleteExisting
          value: "true"
    {{- if eq .Values.pipeline.mode "imageBuild" }}
    - name: build-push
      taskRef:
        name: {{ .Values.taskRefs.build }}
      runAfter:
        - clone-repo
      workspaces:
        - name: source
          workspace: shared-data
        - name: dockerconfig
          workspace: docker-credentials
      params:
        - name: IMAGE
          value: "$(params.{{ .Values.pipeline.params.imageReference }}):$(params.{{ .Values.pipeline.params.imageTag }})"
        - name: DOCKERFILE
          value: "$(params.{{ .Values.pipeline.params.imageDockerfile }})"
        - name: CONTEXT
          value: "$(params.{{ .Values.pipeline.params.imageContext }})"
        - name: BUILDER_IMAGE
          value: {{ .Values.pipeline.builderImage | quote }}
        {{- if .Values.pipeline.buildArgs }}
        - name: BUILD_ARGS
          value:
            {{- range $arg := .Values.pipeline.buildArgs }}
            - {{ $arg | quote }}
            {{- end }}
        {{- end }}
    {{- else if eq .Values.pipeline.mode "inlineDeploy" }}
    - name: deploy-argocd-apps
      runAfter:
        - clone-repo
      taskSpec:
        params:
          - name: repo-url
          - name: revision
          - name: branch-name
          - name: event-type
          - name: before-sha
          - name: after-sha
        workspaces:
          - name: source
        steps:
          - name: deploy
            image: {{ .Values.deploy.image | quote }}
            workingDir: $(workspaces.source.path)
            env:
              - name: CI_REPO_URL
                value: "$(params.repo-url)"
              - name: CI_REVISION
                value: "$(params.revision)"
              - name: CI_BRANCH_NAME
                value: "$(params.branch-name)"
              - name: CI_EVENT_TYPE
                value: "$(params.event-type)"
              - name: CI_BEFORE_SHA
                value: "$(params.before-sha)"
              - name: CI_AFTER_SHA
                value: "$(params.after-sha)"
              - name: DEPLOY_VALUES_GLOB
                value: {{ .Values.deploy.valuesGlob | quote }}
              - name: DEPLOY_LOCK_SUFFIX
                value: {{ .Values.deploy.lockSuffix | quote }}
              - name: DEPLOY_CHART_REF
                value: {{ .Values.deploy.chartRef | quote }}
              - name: DEPLOY_DEFAULT_NAMESPACE
                value: {{ .Values.deploy.defaultNamespace | quote }}
              - name: DEPLOY_TARGET_BRANCH
                value: {{ .Values.deploy.targetBranch | quote }}
            script: |
              #!/usr/bin/env bash
              set -euo pipefail

              git config --global --add safe.directory "$(pwd)"

              strip_wrapping_quotes() {
                local value="$1"
                value="${value%\"}"
                value="${value#\"}"
                value="${value%\'}"
                value="${value#\'}"
                printf '%s' "$value"
              }

              lock_file_for() {
                local values_file="$1"
                case "$values_file" in
                  *.yaml) printf '%s%s\n' "${values_file%.yaml}" "${DEPLOY_LOCK_SUFFIX}" ;;
                  *.yml) printf '%s%s\n' "${values_file%.yml}" "${DEPLOY_LOCK_SUFFIX}" ;;
                  *) printf '%s%s\n' "${values_file}" "${DEPLOY_LOCK_SUFFIX}" ;;
                esac
              }

              yaml_get() {
                local key="$1"
                local file="$2"
                local raw=""
                if command -v yq >/dev/null 2>&1; then
                  raw="$(yq -r ".${key} // \"\"" "$file")"
                else
                  raw="$(awk -F': *' -v target="$key" '$1 == target {print $2; exit}' "$file")"
                fi
                raw="$(strip_wrapping_quotes "$raw")"
                printf '%s' "$raw"
              }

              resolve_changed_files() {
                local before="${CI_BEFORE_SHA:-}"
                local after="${CI_AFTER_SHA:-}"
                local event_type="${CI_EVENT_TYPE:-}"
                local target_branch="${DEPLOY_TARGET_BRANCH}"
                local target_ref="origin/${target_branch}"

                git fetch --no-tags origin "${target_branch}:${target_branch}" >/dev/null 2>&1 || git fetch --no-tags origin "${target_branch}" >/dev/null 2>&1 || true

                if [ "$event_type" = "pull_request" ]; then
                  if [ -z "$after" ] || [ "$after" = "null" ]; then
                    after="${CI_REVISION:-HEAD}"
                  fi
                  if [ -z "$before" ] || [ "$before" = "null" ]; then
                    if git rev-parse --verify -q "$target_ref" >/dev/null; then
                      before="$(git merge-base "$target_ref" "$after")"
                    else
                      before=""
                    fi
                  fi
                else
                  if [ -z "$after" ] || [ "$after" = "null" ]; then
                    after="${CI_REVISION:-HEAD}"
                  fi
                fi

                if [ -n "$before" ] && [ "$before" != "0000000000000000000000000000000000000000" ]; then
                  git diff --name-only "$before" "$after" 2>/dev/null || git show --pretty="" --name-only "$after"
                  return
                fi

                git show --pretty="" --name-only "$after"
              }

              changed_files="$(resolve_changed_files)"
              values_files_tmp="$(mktemp)"
              selected_count=0

              while IFS= read -r path; do
                [ -n "$path" ] || continue
                [ -f "$path" ] || continue
                [[ "$path" == $DEPLOY_VALUES_GLOB ]] || continue
                [[ "$path" == *"${DEPLOY_LOCK_SUFFIX}" ]] && continue
                printf '%s\n' "$path" >>"$values_files_tmp"
                selected_count=$((selected_count + 1))
              done <<<"$changed_files"

              if [ "$selected_count" -eq 0 ]; then
                echo "No changed values files matching ${DEPLOY_VALUES_GLOB}. Exiting successfully."
                exit 0
              fi

              sort -u "$values_files_tmp" -o "$values_files_tmp"

              should_install="false"
              if [ "${CI_EVENT_TYPE}" = "push" ] && [ "${CI_BRANCH_NAME}" = "${DEPLOY_TARGET_BRANCH}" ]; then
                should_install="true"
              fi

              echo "Selected values files:"
              cat "$values_files_tmp"
              echo "Install mode: ${should_install} (event=${CI_EVENT_TYPE}, branch=${CI_BRANCH_NAME}, target=${DEPLOY_TARGET_BRANCH})"

              while IFS= read -r values_file; do
                [ -n "$values_file" ] || continue
                lock_file="$(lock_file_for "$values_file")"

                if [ ! -f "$lock_file" ]; then
                  echo "Missing lock file for ${values_file}: ${lock_file}"
                  exit 1
                fi

                chart_version="$(yaml_get chartVersion "$lock_file")"
                release_name="$(yaml_get releaseName "$lock_file")"
                namespace="$(yaml_get namespace "$lock_file")"

                if [ -z "$chart_version" ] || [ "$chart_version" = "null" ]; then
                  echo "Missing chartVersion in ${lock_file}"
                  exit 1
                fi
                if [ -z "$release_name" ] || [ "$release_name" = "null" ]; then
                  echo "Missing releaseName in ${lock_file}"
                  exit 1
                fi
                if [ -z "$namespace" ] || [ "$namespace" = "null" ]; then
                  namespace="${DEPLOY_DEFAULT_NAMESPACE}"
                fi
                if [ -z "$namespace" ]; then
                  echo "Namespace is empty for ${lock_file} and deploy.defaultNamespace is not set"
                  exit 1
                fi

                echo "Validating ${values_file} using chart ${DEPLOY_CHART_REF}:${chart_version} (release=${release_name}, namespace=${namespace})"
                helm pull "${DEPLOY_CHART_REF}" --version "${chart_version}" --destination /tmp >/dev/null
                helm template "${release_name}" "${DEPLOY_CHART_REF}" \
                  --version "${chart_version}" \
                  --namespace "${namespace}" \
                  -f "${values_file}" >/tmp/"${release_name}".rendered.yaml

                if [ "${should_install}" = "true" ]; then
                  echo "Installing/upgrading ${release_name} in namespace ${namespace}"
                  helm upgrade --install "${release_name}" "${DEPLOY_CHART_REF}" \
                    --version "${chart_version}" \
                    --namespace "${namespace}" \
                    -f "${values_file}" \
                    --wait \
                    --timeout 5m
                else
                  echo "Skipping install for ${release_name} (validation-only mode)"
                fi
              done <"$values_files_tmp"
      params:
        - name: repo-url
          value: "$(params.{{ .Values.pipeline.params.repoUrl }})"
        - name: revision
          value: "$(params.{{ .Values.pipeline.params.revision }})"
        - name: branch-name
          value: "$(params.{{ .Values.pipeline.params.branchName }})"
        - name: event-type
          value: "$(params.{{ .Values.pipeline.params.eventType }})"
        - name: before-sha
          value: "$(params.{{ .Values.pipeline.params.beforeSha }})"
        - name: after-sha
          value: "$(params.{{ .Values.pipeline.params.afterSha }})"
      workspaces:
        - name: source
          workspace: shared-data
    {{- end }}
