{{- if .Values.httpRoute.enabled }}
apiVersion: {{ .Values.apiVersions.gateway }}
kind: HTTPRoute
metadata:
  name: {{ .Values.httpRoute.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "tekton-ci.commonLabels" . | nindent 4 }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  {{- with .Values.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    {{- if eq .Values.eventListener.mode "single" }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.httpRoute.pathPrefix | quote }}
      backendRefs:
        - name: {{ printf "el-%s" (include "tekton-ci.singleListenerName" .) | trunc 63 | trimSuffix "-" }}
          port: 8080
    {{- else if eq .Values.eventListener.mode "perTrigger" }}
    {{- range $trigger := .Values.triggers }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ include "tekton-ci.triggerRoutePath" (dict "root" $ "trigger" $trigger) | quote }}
      backendRefs:
        - name: {{ printf "el-%s" (include "tekton-ci.perTriggerListenerName" (dict "root" $ "trigger" $trigger)) | trunc 63 | trimSuffix "-" }}
          port: 8080
    {{- end }}
    {{- end }}
{{- end }}
