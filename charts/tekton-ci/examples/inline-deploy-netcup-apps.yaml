pipeline:
  mode: inlineDeploy
  name: netcup-apps-ci

run:
  storageClassName: longhorn-ci-ephemeral

deploy:
  image: quay.io/helmpack/chart-testing:v3.14.0
  valuesGlob: bootstrap/argocd-apps/*.yaml
  lockSuffix: .lock.yaml
  chartRef: oci://harbor.harokilabs.com/helm-charts/argocd-apps
  defaultNamespace: argocd
  targetBranch: master
  registryAuth:
    enabled: true
    registry: harbor.harokilabs.com
    secretName: helm-charts-publish
    usernameKey: harbor_username
    passwordKey: harbor_password
  rbac:
    create: true
    namespace: argocd
    serviceAccountName: ci-services
    serviceAccountNamespace: ci

eventListener:
  mode: single
  name: github-netcup-apps
  eventTypes:
    - push
    - pull_request
  includeChangedFiles: true

triggers:
  - name: bootstrap
    repoFullName: dllatas/netcup-apps
    pathFilters:
      - "bootstrap/argocd-apps/"

httpRoute:
  enabled: true
  name: tekton-github-netcup-apps
  parentRefs:
    - namespace: ingress
      name: gateway
  hostnames:
    - build.harokilabs.com
  pathPrefix: /apps/
