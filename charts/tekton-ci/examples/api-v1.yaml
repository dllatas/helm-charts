apiVersions:
  tekton: tekton.dev/v1
  triggers: triggers.tekton.dev/v1
  gateway: gateway.networking.k8s.io/v1

eventListener:
  mode: single
  name: github-listener

triggers:
  - name: sample
    repoFullName: org/repo
    image:
      reference: harbor.example.com/project/app
      dockerfile: Dockerfile
      context: .
    pathFilters:
      - ".*"
