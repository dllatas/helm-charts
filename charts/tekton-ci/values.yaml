nameOverride: ""
fullnameOverride: ""

apiVersions:
  tekton: tekton.dev/v1beta1
  triggers: triggers.tekton.dev/v1beta1
  gateway: gateway.networking.k8s.io/v1

taskRefs:
  clone: git-clone
  build: buildah

pipeline:
  mode: imageBuild
  name: build
  serviceAccountName: ci-services
  builderImage: quay.io/buildah/stable:v1.39.2
  buildArgs: []
  params:
    repoUrl: repo-url
    revision: revision
    branchName: branch-name
    eventType: event-type
    beforeSha: before-sha
    afterSha: after-sha
    imageReference: image-reference
    imageTag: image-tag
    imageDockerfile: image-dockerfile
    imageContext: image-context

deploy:
  image: quay.io/helmpack/chart-testing:v3.14.0
  valuesGlob: bootstrap/argocd-apps/*.yaml
  lockSuffix: .lock.yaml
  chartRef: oci://harbor.harokilabs.com/helm-charts/argocd-apps
  defaultNamespace: argocd
  targetBranch: master
  registryAuth:
    enabled: false
    registry: ""
    secretName: ""
    usernameKey: username
    passwordKey: password
  rbac:
    create: false
    namespace: argocd
    serviceAccountName: ""
    serviceAccountNamespace: ""

run:
  pvcSize: 1Gi
  storageClassName: ""
  pvcAccessModes:
    - ReadWriteOnce
  fsGroup: 65532
  includeCommonLabelsInRuntimeObjects: false
  runtimeLabels: {}
  nodeSelector: {}
  affinity: {}
  sshSecretName: ssh-key
  dockerSecretName: docker-credentials

github:
  secretName: github-secret
  secretKey: secretToken

eventListener:
  mode: single
  name: github-listener
  serviceAccountName: ci-services
  eventTypes:
    - push
  includeChangedFiles: true
  nodeSelector: {}
  affinity: {}

triggerBinding:
  create: true
  name: git
  params: []

triggerTemplate:
  create: true
  name: build-template

httpRoute:
  enabled: false
  name: tekton-webhook
  parentRefs: []
  hostnames: []
  pathPrefix: /
  routePathPrefixByTrigger: {}

triggers:
  - name: sample
    repoFullName: org/repo
    image:
      reference: harbor.example.com/project/sample
      dockerfile: Dockerfile
      context: .
    pathFilters:
      - ".*"
    extraCelFilters: []
