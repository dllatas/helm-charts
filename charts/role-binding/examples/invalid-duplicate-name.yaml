roleBindings:
  - name: triggers-eventlistener-binding
    namespace: ci
    subjects:
      - kind: ServiceAccount
        name: ci-services
        namespace: ci
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: tekton-triggers-eventlistener-roles
  - name: triggers-eventlistener-binding
    namespace: ci
    subjects:
      - kind: ServiceAccount
        name: other
        namespace: ci
    roleRef:
      apiGroup: rbac.authorization.k8s.io
      kind: ClusterRole
      name: tekton-triggers-eventlistener-roles
