{{- range $serviceAccount := .Values.serviceAccounts }}
{{- $labels := mergeOverwrite (dict) $.Values.defaults.labels (default (dict) $serviceAccount.labels) -}}
{{- $annotations := mergeOverwrite (dict) $.Values.defaults.annotations (default (dict) $serviceAccount.annotations) -}}
{{- $namespace := default $.Values.defaults.namespace $serviceAccount.namespace -}}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $serviceAccount.name }}
  namespace: {{ $namespace }}
  labels:
    helm.sh/chart: {{ printf "%s-%s" $.Chart.Name $.Chart.Version | trunc 63 | trimSuffix "-" | quote }}
    app.kubernetes.io/name: {{ $.Chart.Name | quote }}
    app.kubernetes.io/instance: {{ $.Release.Name | quote }}
    app.kubernetes.io/managed-by: {{ $.Release.Service | quote }}
{{- with $labels }}
{{ toYaml . | indent 4 }}
{{ end }}
{{- with $annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{ end }}
{{- if hasKey $serviceAccount "automountServiceAccountToken" }}
automountServiceAccountToken: {{ $serviceAccount.automountServiceAccountToken }}
{{- else if hasKey $.Values.defaults "automountServiceAccountToken" }}
automountServiceAccountToken: {{ $.Values.defaults.automountServiceAccountToken }}
{{- end }}
{{- if hasKey $serviceAccount "imagePullSecrets" }}
{{- with $serviceAccount.imagePullSecrets }}
imagePullSecrets:
{{ toYaml . | indent 2 }}
{{- end }}
{{- else }}
{{- with $.Values.defaults.imagePullSecrets }}
imagePullSecrets:
{{ toYaml . | indent 2 }}
{{- end }}
{{ end }}
{{- if hasKey $serviceAccount "secrets" }}
{{- with $serviceAccount.secrets }}
secrets:
{{ toYaml . | indent 2 }}
{{- end }}
{{- else }}
{{- with $.Values.defaults.secrets }}
secrets:
{{ toYaml . | indent 2 }}
{{ end }}
{{ end }}
{{ printf "\n" }}
{{ end }}
