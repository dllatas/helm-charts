deploymentNameOverride: example-api
resourceNameStrategy: exact
deploymentStrategy:
  type: Recreate

selectorLabels:
  app: example-api

serviceAccountName: example-api

containers:
  - name: app
    image: ghcr.io/nginx/nginx-unprivileged:1.27
    ports:
      - name: http
        containerPort: 8080
    volumeMounts:
      - name: data
        mountPath: /data

services:
  - name: example-api
    ports:
      - name: http
        port: 80
        targetPort: http

httpRoutes:
  - name: example-api
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    parentRefs:
      - name: gateway
        namespace: ingress
    hostnames:
      - example.internal
    rules:
      - backendRefs:
          - service: example-api
            port: 80

persistentVolumeClaims:
  - name: data
    accessModes:
      - ReadWriteOnce
    size: 1Gi
