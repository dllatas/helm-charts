containers:
  - name: app
    image: ghcr.io/nginx/nginx-unprivileged:1.27
    ports:
      - name: http
        containerPort: 8080

services:
  - name: web
    ports:
      - name: http
        port: 80
        targetPort: http

httpRoutes:
  - name: public
    parentRefs:
      - name: shared-gateway
    rules:
      - backendRefs:
          - service: does-not-exist
            port: 80
