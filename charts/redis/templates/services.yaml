apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.primaryHeadlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "redis.labels" (dict "root" . "component" "primary") | indent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      protocol: TCP
      targetPort: redis
  selector:
{{ include "redis.selectorLabels" (dict "root" . "component" "primary") | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.primaryServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "redis.labels" (dict "root" . "component" "primary") | indent 4 }}
{{- with .Values.primary.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.primary.service.type }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      protocol: TCP
      targetPort: redis
  selector:
{{ include "redis.selectorLabels" (dict "root" . "component" "primary") | indent 4 }}
{{- if gt (int .Values.replica.replicaCount) 0 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.replicaHeadlessServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "redis.labels" (dict "root" . "component" "replica") | indent 4 }}
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      protocol: TCP
      targetPort: redis
  selector:
{{ include "redis.selectorLabels" (dict "root" . "component" "replica") | indent 4 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "redis.replicaServiceName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "redis.labels" (dict "root" . "component" "replica") | indent 4 }}
{{- with .Values.replica.service.annotations }}
  annotations:
{{ toYaml . | indent 4 }}
{{- end }}
spec:
  type: {{ .Values.replica.service.type }}
  ports:
    - name: redis
      port: {{ .Values.redis.port }}
      protocol: TCP
      targetPort: redis
  selector:
{{ include "redis.selectorLabels" (dict "root" . "component" "replica") | indent 4 }}
{{- end }}
