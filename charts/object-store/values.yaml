apiVersion: barmancloud.cnpg.io/v1

objectStores:
  - name: example-store
    namespace: storage
    labels: {}
    annotations: {}
    spec:
      configuration:
        destinationPath: s3://example-backup/
        endpointURL: http://minio.storage.svc.cluster.local:9000
        s3Credentials:
          accessKeyId:
            name: minio-creds
            key: ACCESS_KEY_ID
          secretAccessKey:
            name: minio-creds
            key: ACCESS_SECRET_KEY
        wal:
          compression: gzip
          encryption: AES256
