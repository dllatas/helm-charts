apiVersion: batch/v1

global: {}

cronJobs:
  - name: example-cronjob
    namespace: default
    labels: {}
    annotations: {}
    spec:
      schedule: "0 0 * * *"
      jobTemplate:
        spec:
          template:
            spec:
              restartPolicy: OnFailure
              containers:
                - name: example
                  image: busybox:1.36.1
                  command: ["sh", "-c", "echo hello from cronjob"]
