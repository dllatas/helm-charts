serviceMonitors:
  - name: istio-controlplane
    namespace: observability
    labels:
      release: prometheus
    spec:
      jobLabel: istio
      selector:
        matchExpressions:
          - key: istio
            operator: In
            values:
              - mixer
              - pilot
              - galley
              - citadel
              - sidecar-injector
      namespaceSelector:
        any: true
      endpoints:
        - port: http-monitoring
          interval: 15s
        - port: http-policy-monitoring
          interval: 15s
